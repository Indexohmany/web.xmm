<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F48FB1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC407A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Pink favorites background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Empty heart outline -->
  <g transform="translate(256, 95)">
    <path d="M0 25 L-30 -5 Q-45 -25 -30 -40 Q-15 -55 0 -35 Q15 -55 30 -40 Q45 -25 30 -5 Z" 
          fill="none" stroke="white" stroke-width="5" opacity="0.5" stroke-dasharray="8,5"/>
  </g>
  
  <!-- Small floating hearts (faded) -->
  <path d="M90 150 L80 140 Q72 130 80 122 Q88 115 95 125 Q102 115 110 122 Q118 130 110 140 Z" fill="white" opacity="0.25"/>
  <path d="M420 180 L413 173 Q408 166 413 160 Q418 154 423 161 Q428 154 433 160 Q438 166 433 173 Z" fill="white" opacity="0.2"/>
  
  <g transform="translate(256, 300)">
    <!-- Cat ears - slightly droopy -->
    <path d="M-118 -72 L-82 -160 L-42 -78 Z" fill="#FFB74D"/>
    <path d="M-106 -78 L-82 -135 L-52 -82 Z" fill="#FF8A65"/>
    <path d="M118 -72 L82 -160 L42 -78 Z" fill="#FFB74D"/>
    <path d="M106 -78 L82 -135 L52 -82 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Puppy dog eyes (big and sad) -->
    <ellipse cx="-48" cy="-8" rx="40" ry="45" fill="white"/>
    <ellipse cx="48" cy="-8" rx="40" ry="45" fill="white"/>
    
    <!-- Sad eyebrows -->
    <path d="M-78 -45 Q-48 -55 -18 -42" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M78 -45 Q48 -55 18 -42" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Big shimmery pupils -->
    <ellipse cx="-48" cy="0" rx="25" ry="32" fill="url(#eyeGrad)"/>
    <ellipse cx="48" cy="0" rx="25" ry="32" fill="url(#eyeGrad)"/>
    
    <!-- Extra sparkly (hopeful) eyes -->
    <circle cx="-38" cy="-18" r="12" fill="white"/>
    <circle cx="58" cy="-18" r="12" fill="white"/>
    <circle cx="-55" cy="8" r="7" fill="white" opacity="0.9"/>
    <circle cx="42" cy="8" r="7" fill="white" opacity="0.9"/>
    <circle cx="-42" cy="-5" r="4" fill="white" opacity="0.7"/>
    <circle cx="54" cy="-5" r="4" fill="white" opacity="0.7"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Small sad mouth -->
    <path d="M-18 75 Q0 68 18 75" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Whiskers -->
    <line x1="-55" y1="52" x2="-105" y2="58" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="62" x2="-108" y2="70" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="52" x2="105" y2="58" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="62" x2="108" y2="70" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
 
</svg>
