<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C6BC0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3F51B5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Indigo sleepy background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- ZZZ sleeping -->
  <g fill="white" font-family="Arial" font-weight="bold">
    <text x="360" y="140" font-size="45" opacity="0.9">Z</text>
    <text x="390" y="110" font-size="35" opacity="0.7">Z</text>
    <text x="415" y="85" font-size="28" opacity="0.5">Z</text>
  </g>
  
  <!-- Moon and stars -->
  <g transform="translate(100, 120)">
    <path d="M0 0 Q-20 25 0 50 Q30 25 0 0" fill="white" opacity="0.3"/>
  </g>
  <circle cx="130" cy="160" r="3" fill="white" opacity="0.4"/>
  <circle cx="80" cy="180" r="2" fill="white" opacity="0.3"/>
  
  <g transform="translate(256, 300)">
    <!-- Cat ears - relaxed/droopy -->
    <path d="M-120 -65 L-88 -150 L-48 -72 Z" fill="#FFB74D"/>
    <path d="M-108 -70 L-88 -128 L-58 -76 Z" fill="#FF8A65"/>
    <path d="M120 -65 L88 -150 L48 -72 Z" fill="#FFB74D"/>
    <path d="M108 -70 L88 -128 L58 -76 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Closed sleeping eyes -->
    <path d="M-70 -5 Q-48 10 -26 -5" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M70 -5 Q48 10 26 -5" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Relaxed eyebrows -->
    <path d="M-72 -18 L-28 -22" stroke="#5D4037" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <path d="M72 -18 L28 -22" stroke="#5D4037" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Slight open sleepy mouth -->
    <ellipse cx="0" cy="75" rx="10" ry="8" fill="#5D4037"/>
    <ellipse cx="0" cy="73" rx="6" ry="5" fill="#FF8A80"/>
    
    <!-- Whiskers - droopy/relaxed -->
    <line x1="-55" y1="52" x2="-102" y2="62" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="62" x2="-105" y2="75" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="52" x2="102" y2="62" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="62" x2="105" y2="75" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>

</svg>
