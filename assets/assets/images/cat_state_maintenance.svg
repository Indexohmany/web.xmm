<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB300;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8F00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDD835;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F9A825;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Construction yellow background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Hazard stripes -->
  <g opacity="0.15">
    <rect x="50" y="420" width="412" height="30" fill="black"/>
    <path d="M50 420 L80 450 L50 450 Z M80 420 L110 450 L80 450 Z M110 420 L140 450 L110 450 Z M140 420 L170 450 L140 450 Z M170 420 L200 450 L170 450 Z M200 420 L230 450 L200 450 Z M230 420 L260 450 L230 450 Z M260 420 L290 450 L260 450 Z M290 420 L320 450 L290 450 Z M320 420 L350 450 L320 450 Z M350 420 L380 450 L350 450 Z M380 420 L410 450 L380 450 Z M410 420 L440 450 L410 450 Z M440 420 L462 450 L440 450 Z" fill="#FFB300"/>
  </g>
  
  <!-- Gears/tools -->
  <g transform="translate(95, 150)" fill="white" opacity="0.4">
    <circle cx="0" cy="0" r="25" fill="none" stroke="white" stroke-width="8"/>
    <circle cx="0" cy="0" r="8"/>
    <rect x="-4" y="-35" width="8" height="12" rx="2"/>
    <rect x="-4" y="23" width="8" height="12" rx="2"/>
    <rect x="-35" y="-4" width="12" height="8" rx="2"/>
    <rect x="23" y="-4" width="12" height="8" rx="2"/>
  </g>
  
  <g transform="translate(256, 305)">
    <!-- Cat ears -->
    <path d="M-118 -70 L-82 -160 L-42 -78 Z" fill="#FFB74D"/>
    <path d="M-106 -76 L-82 -135 L-52 -82 Z" fill="#FF8A65"/>
    <path d="M118 -70 L82 -160 L42 -78 Z" fill="#FFB74D"/>
    <path d="M106 -76 L82 -135 L52 -82 Z" fill="#FF8A65"/>
    
    <!-- Hard hat -->
    <ellipse cx="0" cy="-115" rx="95" ry="30" fill="url(#hatGrad)"/>
    <path d="M-85 -115 Q-90 -160 0 -175 Q90 -160 85 -115" fill="url(#hatGrad)"/>
    <rect x="-75" y="-120" width="150" height="8" fill="#FF8F00"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Determined eyes -->
    <ellipse cx="-48" cy="-10" rx="36" ry="40" fill="white"/>
    <ellipse cx="48" cy="-10" rx="36" ry="40" fill="white"/>
    
    <!-- Focused eyebrows -->
    <path d="M-78 -42 L-20 -48" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
    <path d="M78 -42 L20 -48" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Pupils -->
    <ellipse cx="-48" cy="-5" rx="22" ry="28" fill="url(#eyeGrad)"/>
    <ellipse cx="48" cy="-5" rx="22" ry="28" fill="url(#eyeGrad)"/>
    
    <!-- Eye shine -->
    <circle cx="-40" cy="-20" r="9" fill="white"/>
    <circle cx="56" cy="-20" r="9" fill="white"/>
    <circle cx="-55" cy="2" r="5" fill="white" opacity="0.8"/>
    <circle cx="42" cy="2" r="5" fill="white" opacity="0.8"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Determined smile -->
    <path d="M-22 72 Q0 82 22 72" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Whiskers -->
    <line x1="-55" y1="50" x2="-108" y2="45" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="60" x2="-110" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="50" x2="108" y2="45" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="60" x2="110" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Wrench -->
  <g transform="translate(410, 320) rotate(30)">
    <rect x="-8" y="-50" width="16" height="70" rx="3" fill="white" opacity="0.8"/>
    <path d="M-18 -55 Q0 -70 18 -55 L12 -45 L-12 -45 Z" fill="white" opacity="0.8"/>
    <ellipse cx="0" cy="-55" rx="8" ry="6" fill="#FF8F00"/>
  </g>

</svg>
