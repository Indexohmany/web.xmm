<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7E57C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#673AB7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Purple chat background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Empty chat bubbles -->
  <g transform="translate(120, 100)">
    <rect x="0" y="0" width="80" height="35" rx="15" fill="white" opacity="0.3"/>
    <path d="M15 35 L25 50 L35 35" fill="white" opacity="0.3"/>
    <line x1="15" y1="12" x2="65" y2="12" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,6"/>
    <line x1="15" y1="23" x2="50" y2="23" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.4" stroke-dasharray="8,6"/>
  </g>
  <g transform="translate(320, 110)">
    <rect x="0" y="0" width="70" height="30" rx="12" fill="white" opacity="0.2"/>
    <path d="M55 30 L45 42 L35 30" fill="white" opacity="0.2"/>
  </g>
  
  <g transform="translate(256, 305)">
    <!-- Cat ears -->
    <path d="M-118 -75 L-82 -165 L-42 -80 Z" fill="#FFB74D"/>
    <path d="M-106 -80 L-82 -140 L-52 -83 Z" fill="#FF8A65"/>
    <path d="M118 -75 L82 -165 L42 -80 Z" fill="#FFB74D"/>
    <path d="M106 -80 L82 -140 L52 -83 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Hopeful/waiting eyes - looking to side -->
    <ellipse cx="-48" cy="-10" rx="38" ry="42" fill="white"/>
    <ellipse cx="48" cy="-10" rx="38" ry="42" fill="white"/>
    
    <!-- Pupils looking to the side (waiting for message) -->
    <ellipse cx="-38" cy="-5" rx="22" ry="28" fill="url(#eyeGrad)"/>
    <ellipse cx="58" cy="-5" rx="22" ry="28" fill="url(#eyeGrad)"/>
    
    <!-- Eye shine -->
    <circle cx="-30" cy="-20" r="10" fill="white"/>
    <circle cx="66" cy="-20" r="10" fill="white"/>
    <circle cx="-45" cy="5" r="6" fill="white" opacity="0.8"/>
    <circle cx="52" cy="5" r="6" fill="white" opacity="0.8"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Slight pout -->
    <path d="M-15 72 Q0 78 15 72" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Whiskers -->
    <line x1="-55" y1="50" x2="-108" y2="45" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="60" x2="-110" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="50" x2="108" y2="45" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="60" x2="110" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- "..." thinking/waiting -->
  <g transform="translate(380, 280)">
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="20" cy="0" r="6" fill="white" opacity="0.7"/>
    <circle cx="40" cy="0" r="6" fill="white" opacity="0.7"/>
  </g>
  
</svg>
