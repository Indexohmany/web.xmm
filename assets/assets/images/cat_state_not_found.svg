<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Question marks floating -->
  <text x="90" y="120" font-family="Arial" font-size="50" font-weight="bold" fill="white" opacity="0.7">?</text>
  <text x="400" y="150" font-family="Arial" font-size="40" font-weight="bold" fill="white" opacity="0.5">?</text>
  <text x="70" y="400" font-family="Arial" font-size="35" font-weight="bold" fill="white" opacity="0.4">?</text>
  
  <g transform="translate(256, 280)">
    <!-- Cat ears - one perked, one tilted (confused) -->
    <path d="M-120 -80 L-80 -170 L-35 -80 Z" fill="#FFB74D"/>
    <path d="M-108 -85 L-80 -145 L-48 -85 Z" fill="#FF8A65"/>
    <!-- Right ear tilted -->
    <path d="M110 -60 L95 -160 L45 -70 Z" fill="#FFB74D" transform="rotate(15, 80, -100)"/>
    <path d="M100 -67 L95 -135 L55 -75 Z" fill="#FF8A65" transform="rotate(15, 80, -100)"/>
    
    <!-- Cat head - slightly tilted -->
    <g transform="rotate(8)">
      <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
      <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
      
      <!-- Confused eyes - different sizes -->
      <ellipse cx="-48" cy="-10" rx="35" ry="40" fill="white"/>
      <ellipse cx="48" cy="-10" rx="42" ry="48" fill="white"/>
      
      <!-- Confused eyebrows -->
      <path d="M-75 -42 L-20 -50" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
      <path d="M75 -55 L25 -48" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
      
      <!-- Pupils - one looking up, one to side -->
      <ellipse cx="-48" cy="-15" rx="20" ry="26" fill="url(#eyeGrad)"/>
      <ellipse cx="52" cy="-5" rx="24" ry="32" fill="url(#eyeGrad)"/>
      
      <!-- Eye shine -->
      <circle cx="-40" cy="-28" r="8" fill="white"/>
      <circle cx="60" cy="-20" r="10" fill="white"/>
      <circle cx="-55" cy="-5" r="5" fill="white" opacity="0.8"/>
      <circle cx="42" cy="8" r="6" fill="white" opacity="0.8"/>
      
      <!-- Nose -->
      <path d="M0 38 L-12 53 Q0 60 12 53 Z" fill="#FF8A65"/>
      
      <!-- Confused squiggle mouth -->
      <path d="M-20 70 Q-10 65 0 72 Q10 78 20 70" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
      
      <!-- Whiskers -->
      <line x1="-55" y1="48" x2="-105" y2="38" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-55" y1="60" x2="-108" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="48" x2="105" y2="38" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="60" x2="108" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Big question mark -->
  <text x="400" y="320" font-family="Arial" font-size="80" font-weight="bold" fill="white" opacity="0.9">?</text>
  
</svg>
