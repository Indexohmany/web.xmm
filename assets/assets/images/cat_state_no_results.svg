<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90A4AE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#78909C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Muted gray background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Magnifying glass -->
  <g transform="translate(390, 130)">
    <circle cx="0" cy="0" r="30" fill="none" stroke="white" stroke-width="8" opacity="0.8"/>
    <line x1="22" y1="22" x2="45" y2="45" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <!-- X inside (no results) -->
    <line x1="-12" y1="-12" x2="12" y2="12" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="-12" x2="-12" y2="12" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <g transform="translate(256, 300)">
    <!-- Cat ears - alert but confused -->
    <path d="M-118 -75 L-80 -168 L-38 -78 Z" fill="#FFB74D"/>
    <path d="M-106 -80 L-80 -142 L-50 -82 Z" fill="#FF8A65"/>
    <path d="M115 -70 L85 -165 L42 -75 Z" fill="#FFB74D" transform="rotate(8, 80, -110)"/>
    <path d="M105 -76 L85 -140 L52 -80 Z" fill="#FF8A65" transform="rotate(8, 80, -110)"/>
    
    <!-- Cat head - slight tilt -->
    <g transform="rotate(-5)">
      <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
      <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
      
      <!-- Searching eyes - looking around -->
      <ellipse cx="-48" cy="-10" rx="38" ry="42" fill="white"/>
      <ellipse cx="48" cy="-10" rx="38" ry="42" fill="white"/>
      
      <!-- Pupils looking to opposite sides -->
      <ellipse cx="-58" cy="-8" rx="22" ry="28" fill="url(#eyeGrad)"/>
      <ellipse cx="38" cy="-8" rx="22" ry="28" fill="url(#eyeGrad)"/>
      
      <!-- Eye shine -->
      <circle cx="-50" cy="-22" r="10" fill="white"/>
      <circle cx="46" cy="-22" r="10" fill="white"/>
      <circle cx="-65" cy="0" r="6" fill="white" opacity="0.8"/>
      <circle cx="32" cy="0" r="6" fill="white" opacity="0.8"/>
      
      <!-- Nose -->
      <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
      
      <!-- Puzzled mouth -->
      <path d="M-15 72 L15 72" stroke="#5D4037" stroke-width="4" stroke-linecap="round"/>
      <path d="M18 70 Q25 75 22 82" stroke="#5D4037" stroke-width="3" stroke-linecap="round" fill="none"/>
      
      <!-- Whiskers -->
      <line x1="-55" y1="50" x2="-108" y2="42" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="-55" y1="60" x2="-110" y2="58" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="50" x2="108" y2="42" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="55" y1="60" x2="110" y2="58" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
  
</svg>
