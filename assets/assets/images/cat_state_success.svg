<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#43A047;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Green success background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Celebration sparkles -->
  <g fill="white">
    <path d="M80 100 L85 115 L80 130 L75 115 Z M67 115 L80 120 L93 115 L80 110 Z" opacity="0.9"/>
    <path d="M420 120 L424 132 L420 144 L416 132 Z M410 132 L420 136 L430 132 L420 128 Z" opacity="0.85"/>
    <path d="M100 380 L103 390 L100 400 L97 390 Z M92 390 L100 393 L108 390 L100 387 Z" opacity="0.7"/>
    <path d="M400 400 L403 410 L400 420 L397 410 Z M392 410 L400 413 L408 410 L400 407 Z" opacity="0.7"/>
    <circle cx="130" cy="150" r="4" opacity="0.6"/>
    <circle cx="380" cy="180" r="3" opacity="0.5"/>
    <circle cx="90" cy="300" r="3" opacity="0.5"/>
    <circle cx="420" cy="320" r="4" opacity="0.6"/>
  </g>
  
  <!-- Checkmark -->
  <g transform="translate(256, 85)">
    <circle cx="0" cy="0" r="35" fill="white" opacity="0.95"/>
    <path d="M-15 0 L-5 12 L18 -12" stroke="#43A047" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <g transform="translate(256, 295)">
    <!-- Cat ears - perky/happy -->
    <path d="M-115 -80 L-78 -180 L-38 -80 Z" fill="#FFB74D"/>
    <path d="M-103 -85 L-78 -155 L-50 -85 Z" fill="#FF8A65"/>
    <path d="M115 -80 L78 -180 L38 -80 Z" fill="#FFB74D"/>
    <path d="M103 -85 L78 -155 L50 -85 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Happy closed eyes (curved lines) -->
    <path d="M-70 -10 Q-48 -35 -26 -10" stroke="#5D4037" stroke-width="6" stroke-linecap="round" fill="none"/>
    <path d="M70 -10 Q48 -35 26 -10" stroke="#5D4037" stroke-width="6" stroke-linecap="round" fill="none"/>
    
    <!-- Blush marks -->
    <ellipse cx="-75" cy="20" rx="18" ry="10" fill="#FF8A80" opacity="0.5"/>
    <ellipse cx="75" cy="20" rx="18" ry="10" fill="#FF8A80" opacity="0.5"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Big happy smile -->
    <path d="M-35 65 Q0 95 35 65" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Whiskers - perky -->
    <line x1="-55" y1="48" x2="-110" y2="35" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="58" x2="-115" y2="52" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="48" x2="110" y2="35" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="58" x2="115" y2="52" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>

</svg>
