<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA726;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Golden/amber success background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Floating coins -->
  <g fill="#FFD54F" stroke="#FF8F00" stroke-width="2">
    <ellipse cx="95" cy="120" rx="25" ry="22" opacity="0.9"/>
    <text x="95" y="128" font-family="Arial" font-size="22" font-weight="bold" fill="#FF8F00" text-anchor="middle">¥</text>
    
    <ellipse cx="420" cy="140" rx="22" ry="20" opacity="0.85"/>
    <text x="420" y="147" font-family="Arial" font-size="20" font-weight="bold" fill="#FF8F00" text-anchor="middle">¥</text>
    
    <ellipse cx="80" cy="380" rx="20" ry="18" opacity="0.7"/>
    <text x="80" y="386" font-family="Arial" font-size="18" font-weight="bold" fill="#FF8F00" text-anchor="middle">¥</text>
    
    <ellipse cx="430" cy="400" rx="18" ry="16" opacity="0.65"/>
    <text x="430" y="406" font-family="Arial" font-size="16" font-weight="bold" fill="#FF8F00" text-anchor="middle">¥</text>
  </g>
  
  <!-- Sparkles -->
  <g fill="white">
    <path d="M130 180 L133 190 L130 200 L127 190 Z M122 190 L130 193 L138 190 L130 187 Z" opacity="0.8"/>
    <path d="M380 200 L383 210 L380 220 L377 210 Z M372 210 L380 213 L388 210 L380 207 Z" opacity="0.75"/>
  </g>
  
  <g transform="translate(256, 256)">
    <!-- Cat ears - super perky/excited -->
    <path d="M-112 -85 L-78 -185 L-40 -85 Z" fill="#FFB74D"/>
    <path d="M-100 -90 L-78 -160 L-52 -90 Z" fill="#FF8A65"/>
    <path d="M112 -85 L78 -185 L40 -85 Z" fill="#FFB74D"/>
    <path d="M100 -90 L78 -160 L52 -90 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Super happy closed eyes -->
    <path d="M-72 -8 Q-48 -38 -24 -8" stroke="#5D4037" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M72 -8 Q48 -38 24 -8" stroke="#5D4037" stroke-width="7" stroke-linecap="round" fill="none"/>
    
    <!-- Blush marks -->
    <ellipse cx="-78" cy="22" rx="20" ry="12" fill="#FF8A80" opacity="0.55"/>
    <ellipse cx="78" cy="22" rx="20" ry="12" fill="#FF8A80" opacity="0.55"/>
    
    <!-- Nose -->
    <path d="M0 42 L-12 57 Q0 64 12 57 Z" fill="#FF8A65"/>
    
    <!-- Big excited open smile -->
    <path d="M-38 68 Q0 105 38 68" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M-30 72 Q0 95 30 72" fill="#FF8A80"/>
    
    <!-- Whiskers - excited/perky -->
    <line x1="-55" y1="48" x2="-115" y2="30" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="58" x2="-118" y2="50" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="48" x2="115" y2="30" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="58" x2="118" y2="50" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
</svg>
