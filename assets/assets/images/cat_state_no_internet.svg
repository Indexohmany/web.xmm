<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#78909C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#546E7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Grayish background for disconnected feel -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Broken WiFi icon -->
  <g transform="translate(256, 95)">
    <path d="M-50 20 Q0 -25 50 20" stroke="white" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.4"/>
    <path d="M-35 32 Q0 0 35 32" stroke="white" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M-18 44 Q0 28 18 44" stroke="white" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.6"/>
    <circle cx="0" cy="55" r="6" fill="white" opacity="0.7"/>
    <!-- X mark over wifi -->
    <line x1="-25" y1="10" x2="25" y2="50" stroke="#F44336" stroke-width="8" stroke-linecap="round"/>
    <line x1="25" y1="10" x2="-25" y2="50" stroke="#F44336" stroke-width="8" stroke-linecap="round"/>
  </g>
  
  <g transform="translate(256, 300)">
    <!-- Cat ears - droopy/sad -->
    <path d="M-120 -75 L-85 -160 L-40 -85 Z" fill="#FFB74D"/>
    <path d="M-110 -82 L-85 -135 L-52 -87 Z" fill="#FF8A65"/>
    <path d="M120 -75 L85 -160 L40 -85 Z" fill="#FFB74D"/>
    <path d="M110 -82 L85 -135 L52 -87 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    
    <!-- Inner face -->
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Sad eyes - looking down -->
    <ellipse cx="-48" cy="-8" rx="38" ry="42" fill="white"/>
    <ellipse cx="48" cy="-8" rx="38" ry="42" fill="white"/>
    
    <!-- Sad eyebrows -->
    <path d="M-75 -45 Q-48 -55 -20 -45" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M75 -45 Q48 -55 20 -45" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Pupils looking down -->
    <ellipse cx="-48" cy="8" rx="24" ry="30" fill="url(#eyeGrad)"/>
    <ellipse cx="48" cy="8" rx="24" ry="30" fill="url(#eyeGrad)"/>
    
    <!-- Minimal eye shine (sad) -->
    <circle cx="-38" cy="-5" r="8" fill="white"/>
    <circle cx="58" cy="-5" r="8" fill="white"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Sad frown -->
    <path d="M-25 75 Q0 60 25 75" stroke="#5D4037" stroke-width="5" stroke-linecap="round" fill="none"/>
    
    <!-- Whiskers (droopy) -->
    <line x1="-55" y1="50" x2="-105" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="62" x2="-108" y2="72" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="50" x2="105" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="62" x2="108" y2="72" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Tear drop -->
    <path d="M75 25 Q80 40 75 50 Q70 40 75 25" fill="#64B5F6"/>
  </g>
  

</svg>
