<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4D00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad4)"/>
  
  <g transform="translate(256, 270)">
    <!-- Cat ears -->
    <path d="M-120 -75 L-80 -170 L-35 -75 Z" fill="#FFB74D"/>
    <path d="M-108 -80 L-80 -145 L-48 -80 Z" fill="#FF8A65"/>
    <path d="M120 -75 L80 -170 L35 -75 Z" fill="#FFB74D"/>
    <path d="M108 -80 L80 -145 L48 -80 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    
    <!-- Cream colored face area -->
    <ellipse cx="0" cy="25" rx="95" ry="70" fill="#FFCC80"/>
    
    <!-- Big eyes -->
    <ellipse cx="-48" cy="-10" rx="38" ry="42" fill="white"/>
    <ellipse cx="48" cy="-10" rx="38" ry="42" fill="white"/>
    
    <!-- Pupils -->
    <ellipse cx="-48" cy="-5" rx="24" ry="30" fill="url(#eyeGrad)"/>
    <ellipse cx="48" cy="-5" rx="24" ry="30" fill="url(#eyeGrad)"/>
    
    <!-- Eye highlights (sparkles) -->
    <circle cx="-38" cy="-20" r="10" fill="white"/>
    <circle cx="-55" cy="5" r="6" fill="white"/>
    <circle cx="58" cy="-20" r="10" fill="white"/>
    <circle cx="41" cy="5" r="6" fill="white"/>
    
    <!-- Nose -->
    <ellipse cx="0" cy="40" rx="12" ry="9" fill="#FF8A65"/>
    
    <!-- Mouth -->
    <path d="M0 49 L0 58" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
    <path d="M0 58 Q-18 75 -28 65" stroke="#5D4037" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M0 58 Q18 75 28 65" stroke="#5D4037" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Whiskers -->
    <line x1="-50" y1="50" x2="-100" y2="40" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-50" y1="60" x2="-102" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-50" y1="70" x2="-100" y2="80" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="50" x2="100" y2="40" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="60" x2="102" y2="60" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="70" x2="100" y2="80" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
