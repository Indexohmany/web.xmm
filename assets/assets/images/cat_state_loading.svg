<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF7043;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF5722;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Loading spinner dots -->
  <g transform="translate(256, 90)">
    <circle cx="0" cy="-25" r="8" fill="white" opacity="1"/>
    <circle cx="18" cy="-18" r="8" fill="white" opacity="0.85"/>
    <circle cx="25" cy="0" r="8" fill="white" opacity="0.7"/>
    <circle cx="18" cy="18" r="8" fill="white" opacity="0.55"/>
    <circle cx="0" cy="25" r="8" fill="white" opacity="0.4"/>
    <circle cx="-18" cy="18" r="8" fill="white" opacity="0.3"/>
    <circle cx="-25" cy="0" r="8" fill="white" opacity="0.2"/>
    <circle cx="-18" cy="-18" r="8" fill="white" opacity="0.15"/>
  </g>
  
  <g transform="translate(256, 295)">
    <!-- Cat ears - alert/perked up -->
    <path d="M-115 -75 L-80 -175 L-40 -75 Z" fill="#FFB74D"/>
    <path d="M-103 -80 L-80 -150 L-52 -80 Z" fill="#FF8A65"/>
    <path d="M115 -75 L80 -175 L40 -75 Z" fill="#FFB74D"/>
    <path d="M103 -80 L80 -150 L52 -80 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Big curious eyes - looking up at loader -->
    <ellipse cx="-48" cy="-10" rx="40" ry="45" fill="white"/>
    <ellipse cx="48" cy="-10" rx="40" ry="45" fill="white"/>
    
    <!-- Pupils looking UP -->
    <ellipse cx="-48" cy="-25" rx="24" ry="30" fill="url(#eyeGrad)"/>
    <ellipse cx="48" cy="-25" rx="24" ry="30" fill="url(#eyeGrad)"/>
    
    <!-- Big sparkly eye shine -->
    <circle cx="-38" cy="-40" r="12" fill="white"/>
    <circle cx="58" cy="-40" r="12" fill="white"/>
    <circle cx="-56" cy="-18" r="7" fill="white" opacity="0.9"/>
    <circle cx="40" cy="-18" r="7" fill="white" opacity="0.9"/>
    <circle cx="-42" cy="-28" r="4" fill="white" opacity="0.7"/>
    <circle cx="54" cy="-28" r="4" fill="white" opacity="0.7"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Small curious "o" mouth -->
    <ellipse cx="0" cy="75" rx="12" ry="10" fill="#5D4037"/>
    <ellipse cx="0" cy="73" rx="8" ry="6" fill="#FF8A80"/>
    
    <!-- Whiskers - alert -->
    <line x1="-55" y1="48" x2="-110" y2="35" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="58" x2="-115" y2="55" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="48" x2="110" y2="35" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="58" x2="115" y2="55" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  

</svg>
