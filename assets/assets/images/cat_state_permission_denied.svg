<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6D4C41;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A4A4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A1A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Brown restricted background -->
  <rect x="0" y="0" width="512" height="512" rx="115" ry="115" fill="url(#bgGrad)"/>
  
  <!-- Lock icon -->
  <g transform="translate(256, 90)">
    <rect x="-28" y="-5" width="56" height="45" rx="8" fill="white" opacity="0.9"/>
    <path d="M-18 -5 L-18 -20 Q-18 -40 0 -40 Q18 -40 18 -20 L18 -5" fill="none" stroke="white" stroke-width="10" opacity="0.9"/>
    <circle cx="0" cy="18" r="8" fill="#6D4C41"/>
    <rect x="-3" y="18" width="6" height="12" fill="#6D4C41"/>
  </g>
  
  <g transform="translate(256, 305)">
    <!-- Cat ears - slightly back (cautious) -->
    <path d="M-120 -68 L-88 -155 L-48 -75 Z" fill="#FFB74D"/>
    <path d="M-108 -74 L-88 -132 L-56 -78 Z" fill="#FF8A65"/>
    <path d="M120 -68 L88 -155 L48 -75 Z" fill="#FFB74D"/>
    <path d="M108 -74 L88 -132 L56 -78 Z" fill="#FF8A65"/>
    
    <!-- Cat head -->
    <ellipse cx="0" cy="0" rx="130" ry="115" fill="#FFB74D"/>
    <ellipse cx="0" cy="25" rx="90" ry="75" fill="#FFCC80"/>
    
    <!-- Apologetic/sorry eyes -->
    <ellipse cx="-48" cy="-10" rx="36" ry="40" fill="white"/>
    <ellipse cx="48" cy="-10" rx="36" ry="40" fill="white"/>
    
    <!-- Worried eyebrows -->
    <path d="M-75 -42 Q-48 -52 -22 -42" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M75 -42 Q48 -52 22 -42" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Pupils -->
    <ellipse cx="-48" cy="-5" rx="20" ry="26" fill="url(#eyeGrad)"/>
    <ellipse cx="48" cy="-5" rx="20" ry="26" fill="url(#eyeGrad)"/>
    
    <!-- Eye shine -->
    <circle cx="-40" cy="-18" r="8" fill="white"/>
    <circle cx="56" cy="-18" r="8" fill="white"/>
    <circle cx="-55" cy="2" r="5" fill="white" opacity="0.8"/>
    <circle cx="42" cy="2" r="5" fill="white" opacity="0.8"/>
    
    <!-- Nose -->
    <path d="M0 40 L-12 55 Q0 62 12 55 Z" fill="#FF8A65"/>
    
    <!-- Sorry/awkward smile -->
    <path d="M-20 72 Q0 78 20 72" stroke="#5D4037" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Sweat drop -->
    <path d="M85 -20 Q90 -5 85 8 Q80 -5 85 -20" fill="#64B5F6"/>
    
    <!-- Whiskers -->
    <line x1="-55" y1="50" x2="-105" y2="52" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-55" y1="60" x2="-108" y2="65" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="50" x2="105" y2="52" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="60" x2="108" y2="65" stroke="#5D4037" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
</svg>
